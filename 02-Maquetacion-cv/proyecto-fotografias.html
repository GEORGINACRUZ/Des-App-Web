<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotografía | Portafolio</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #000; color: #fff; }
        header { background-color: #1a1a1a; padding: 40px 20px; text-align: center; border-bottom: 4px solid #a64dff; }
        h1 { color: #e0b0ff; text-transform: uppercase; letter-spacing: 2px; }
        nav { padding: 20px; }
        .btn-volver { color: #fff; text-decoration: none; border: 1px solid #a64dff; padding: 8px 15px; border-radius: 5px; transition: 0.3s; }
        .btn-volver:hover { background-color: #a64dff; }
        .contenido { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        .descripcion-proyecto { background-color: #1a1a1a; padding: 25px; border-radius: 10px; border-left: 10px solid #a64dff; margin-bottom: 40px; }
        .galeria-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .item-galeria { background-color: #fff; padding: 10px; border-radius: 8px; transition: transform 0.4s; }
        .item-galeria:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(166, 77, 255, 0.4); }
        .item-galeria img { width: 100%; height: auto; display: block; border-radius: 4px; }
        .pie-foto { color: #000; text-align: center; font-size: 0.9rem; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>Galería Fotográfica</h1>
        <p>Capturando momentos y objetos</p>
    </header>
    <nav><a href="index.html" class="btn-volver">← Volver al Inicio</a></nav>
    <main class="contenido">
        <section class="descripcion-proyecto">
            <h2>Perspectiva Fotográfica</h2>
            <p>Muestra de captura digital enfocada en el detalle, la luz natural y los paisajes urbanos de mi entorno como alumna.</p>
        </section>
        <section class="galeria-grid">
            <div class="item-galeria">
                <img src="img/foto_1.png" alt="Foto 1">
                <p class="pie-foto">Paisaje Urbano</p>
            </div>
            <div class="item-galeria">
                <img src="img/foto_2.png" alt="Foto 2">
                <p class="pie-foto">Estudio de Detalle</p>
            </div>
            <div class="item-galeria">
                <img src="img/foto_3.png" alt="Foto 3">
                <p class="pie-foto">Retrato / Entorno</p>
            </div>
        </section>
    </main>
</body>
</html>
